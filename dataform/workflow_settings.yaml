# Dataform project configuration (Dataform core 3.x).
# `defaultProject` and the policy-tag vars are overridden at compile time by the
# orchestrator (Cloud Workflows / Composer) using values emitted by Terraform,
# so the same code is portable across GCP projects.
dataformCoreVersion: 3.0.0
defaultProject: nbs-playground-data-analytics
defaultLocation: asia-southeast2
defaultDataset: demo_silver_banking
defaultAssertionDataset: dataform_assertions
vars:
  bronze_dataset: demo_bronze_as400
  silver_dataset: demo_silver_banking
  gold_dataset: demo_gold_analytics
  # Full policy-tag resource names, injected from Terraform outputs at run time.
  # Left empty so `dataform compile` succeeds locally without live taxonomy;
  # when empty, no bigqueryPolicyTags are emitted (see includes/constants.js).
  policy_tag_pii_name: ""
  policy_tag_pii_phone: ""
  policy_tag_pii_address: ""
  policy_tag_card_pan: ""
